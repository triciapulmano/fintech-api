version: '3.8'

services:
  # PostgreSQL for Users Service
  postgres-users:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fintech_users
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fintech-network

  # PostgreSQL for Wallet Service
  postgres-wallet:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fintech_wallet
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_wallet_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fintech-network

  # PostgreSQL for Transactions Service
  postgres-transactions:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fintech_transactions
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_transactions_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fintech-network

  # Users Microservice
  users-service:
    build:
      context: .
      dockerfile: users-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://user:password@postgres-users:5432/fintech_users
      SECRET_KEY: your-secret-key-change-in-production
    ports:
      - "8081:8001"
    depends_on:
      postgres-users:
        condition: service_healthy
    networks:
      - fintech-network
    restart: on-failure

  # Wallet Microservice
  wallet-service:
    build:
      context: .
      dockerfile: wallet-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://user:password@postgres-wallet:5432/fintech_wallet
      SECRET_KEY: your-secret-key-change-in-production
      USERS_SERVICE_URL: http://users-service:8001
    ports:
      - "8002:8002"
    depends_on:
      postgres-wallet:
        condition: service_healthy
      users-service:
        condition: service_started
    networks:
      - fintech-network
    restart: on-failure

  # Transactions Microservice
  transactions-service:
    build:
      context: .
      dockerfile: transactions-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://user:password@postgres-transactions:5432/fintech_transactions
      SECRET_KEY: your-secret-key-change-in-production
      USERS_SERVICE_URL: http://users-service:8001
      WALLET_SERVICE_URL: http://wallet-service:8002
    ports:
      - "8003:8003"
    depends_on:
      postgres-transactions:
        condition: service_healthy
      users-service:
        condition: service_started
    networks:
      - fintech-network
    restart: on-failure

  # PostgreSQL for Kong
  postgres-kong:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong_secure_password_123
    volumes:
      - postgres_kong_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fintech-network

  # Kong Migrations
  kong-migrations:
    image: kong:latest
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres-kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong_secure_password_123
    command: kong migrations bootstrap
    depends_on:
      postgres-kong:
        condition: service_healthy
    networks:
      - fintech-network
    restart: on-failure

  # Kong API Gateway
  kong:
    image: kong:latest
    environment:
      KONG_DATABASE: "postgres"
      KONG_PG_HOST: postgres-kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong_secure_password_123
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"  # Proxy
      - "8444:8001"  # Admin API
    depends_on:
      kong-migrations:
        condition: service_completed_successfully
    networks:
      - fintech-network
    restart: on-failure

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - fintech-network
    restart: on-failure

volumes:
  postgres_users_data:
  postgres_wallet_data:
  postgres_transactions_data:
  postgres_kong_data:

networks:
  fintech-network:
    driver: bridge